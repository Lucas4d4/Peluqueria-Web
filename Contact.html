<!DOCTYPE html>
<html lang="en">
<head>
  <title>Contact</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width= width-device, initial-scale=1.0">
  <link rel="stylesheet" href="css/Principal.css">
  <link rel="stylesheet" href="css/Contact.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img class="logoEdit" src="contenido/Marilook-logo.png">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Menu.html">Menu</a></li>
            <li><a href="Contact.html">Contact</a></li>
        </ul>
    </header>
    <main class="mainContact">
        <div class="divContact">
                <form id="contact-form" action="https://formspree.io/f/mbdzdaeo" method="post">
            <h1>CONTACTO</h1>
            <br>
            <input type="text" name="nombre" class="textContact" placeholder="Ingrese nombre y apellido"  minlength="5" required>
            <br>
            <input type="email" name="email" class="textContact" placeholder="Ingrese correo(@gmail, @yahoo, etc)" required>
            <br>
            <input type="text" name="asunto" class="textContact" placeholder="Ingrese su asunto" minlength="10" required>
            <br>
            <textarea class="textContact" name="mensaje" rows="5" placeholder="Redacte su mensaje..." minlength="5" required></textarea>
            <br>
            <input type="submit" class="btnContact" value="ENVIAR MENSAJE">
            <p id="form-status"></p>
            </form>
        </div>
    </main>
    <script src="javascript/Contact.js"></script>
</body>

</html>
